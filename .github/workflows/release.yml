name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  release:
    name: Build, Scan & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract SemVer tag names
      - name: Extract Tag Info
        id: tag_info
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          # Convert repository name to lowercase for docker compatibility
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lower_repo=${LOWER_REPO}" >> $GITHUB_OUTPUT

      # Build local image for security checks
      - name: Build Local Release Image
        run: |
          docker build -t beliaja-backend:release .

      # Trivy check (CRITICAL blocks release)
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'beliaja-backend:release'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1' # Blocks releases if critical vulnerability exists
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # Upload SARIF file for GitHub Security Alerts
      - name: Upload SARIF to GitHub Security Alerts
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Push verified release image to GHCR
      - name: Build & Push Release Image to GHCR
        run: |
          TAG="${{ steps.tag_info.outputs.tag }}"
          REPO="${{ steps.tag_info.outputs.lower_repo }}"
          VER="${TAG#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          
          docker tag beliaja-backend:release "ghcr.io/${REPO}/backend:${TAG}"
          docker tag beliaja-backend:release "ghcr.io/${REPO}/backend:${VER}"
          docker tag beliaja-backend:release "ghcr.io/${REPO}/backend:${MAJOR}.${MINOR}"
          docker tag beliaja-backend:release "ghcr.io/${REPO}/backend:${MAJOR}"
          docker tag beliaja-backend:release "ghcr.io/${REPO}/backend:latest"
          
          docker push "ghcr.io/${REPO}/backend:${TAG}"
          docker push "ghcr.io/${REPO}/backend:${VER}"
          docker push "ghcr.io/${REPO}/backend:${MAJOR}.${MINOR}"
          docker push "ghcr.io/${REPO}/backend:${MAJOR}"
          docker push "ghcr.io/${REPO}/backend:latest"

      # Generate Changelog & GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.tag_info.outputs.tag }}
          tag_name: ${{ steps.tag_info.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Beliaja.com E-Commerce Platform Release ${{ steps.tag_info.outputs.tag }}
            
            Verified build is published to GitHub Container Registry (GHCR).
            
            ### Docker Pull Commands:
            ```bash
            docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.tag_info.outputs.tag }}
            docker pull ghcr.io/${{ github.repository }}/backend:latest
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
